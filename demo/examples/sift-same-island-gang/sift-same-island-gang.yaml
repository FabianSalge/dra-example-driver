# Example: Sift same-island training gang
#
# A 4-device, same-island training gang — the Sift "topology" failure mode
# expressed in real DRA. Both the selector and the constraint below are DERIVED
# from a Sift Workload by dra.WorkloadSelector (golden rule: the allocator is the
# single source of matching logic); they are not hand-written here.
#
#   Workload{Kind: train, MinMemoryGB: 80, RequiredPrecisions: [bf16],
#            DeviceCount: 4, SameIsland: true}  -->
#     selectors[].cel.expression  = the hard filter (trainable + memory + bf16)
#     requests[].exactly.count     = 4
#     constraints[].matchAttribute = gpu.example.com/island
#
# The per-device selector only filters to feasible devices; it is the
# matchAttribute constraint that forces all four onto ONE island, so the gang
# never fragments across islands. In the realistic-2026 fleet that means the four
# devices land wholly on the node-2 H100 island, the node-3 H100 island, or the
# node-4 MI300X island — never split across them. (The B200 island has only two
# devices, so it cannot hold the gang.)
#
# The selector CEL is verified to select exactly what allocator.Feasible accepts
# by the parity test in internal/profiles/gpu/sift_parity_test.go.
#
# Expected: one pod, one container, four same-island GPUs. Check with:
#   kubectl logs -n sift-same-island-gang pod0 -c ctr0 | grep GPU_DEVICE
#
# Driver requirements:
#   Profile: gpu  (fleet published from scenarios/realistic-2026.yaml)
#
# Cluster requirements:
#   Kubernetes 1.34+

---
apiVersion: v1
kind: Namespace
metadata:
  name: sift-same-island-gang

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: sift-same-island-gang
  name: island-gang
spec:
  spec:
    devices:
      requests:
      - name: gpus
        exactly:
          deviceClassName: gpu.example.com
          count: 4
          selectors:
          - cel:
              expression: "device.attributes['gpu.example.com'].trainable && device.capacity['gpu.example.com'].memory.compareTo(quantity('80Gi')) >= 0 && 'precision_bf16' in device.attributes['gpu.example.com']"
      constraints:
      - requests:
        - gpus
        matchAttribute: gpu.example.com/island

---
apiVersion: v1
kind: Pod
metadata:
  namespace: sift-same-island-gang
  name: pod0
  labels:
    app: pod
spec:
  containers:
  - name: ctr0
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: gpus
  resourceClaims:
  - name: gpus
    resourceClaimTemplateName: island-gang
